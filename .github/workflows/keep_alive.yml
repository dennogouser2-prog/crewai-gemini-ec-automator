name: Streamlit Keep Alive

on:
  schedule:
    - cron: '0 */4 * * *'  # 4時間おきに実行
  workflow_dispatch:      # 手動実行も可能にします

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run wake up script
        run: python keep_awake.py